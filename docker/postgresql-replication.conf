# PostgreSQL Streaming Replication Configuration
# Include in postgresql.conf on PRIMARY server
#
# Usage:
#   1. Copy to primary: /etc/postgresql/conf.d/replication.conf
#   2. Set up replica with pg_basebackup
#   3. Configure recovery.conf on replica
#
# For Docker, mount as volume:
#   - ./docker/postgresql-replication.conf:/etc/postgresql/conf.d/replication.conf:ro

# --- WAL Settings ---
wal_level = replica
max_wal_senders = 5
wal_keep_size = 1024         # Keep 1GB of WAL files
max_replication_slots = 5

# --- Synchronous Replication (optional - uncomment for zero data loss) ---
# synchronous_commit = on
# synchronous_standby_names = 'replica1'

# --- Archive Settings (for PITR recovery) ---
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/wal_archive/%f && cp %p /var/lib/postgresql/wal_archive/%f'
archive_timeout = 300        # Archive every 5 min even if WAL not full

# --- Performance ---
checkpoint_timeout = 15min
checkpoint_completion_target = 0.9
effective_cache_size = 1GB
shared_buffers = 256MB

# --- Connection ---
listen_addresses = '*'
max_connections = 200
