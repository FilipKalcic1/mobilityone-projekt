# =============================================================================
# Redis 7 - In-Cluster Deployment (DEV/STAGING ONLY)
#
# PRODUCTION: Use managed Redis instead:
#   - Azure: Azure Cache for Redis (Basic C0 or Standard C1)
#   - AWS:   ElastiCache for Redis
#   - GCP:   Memorystore for Redis
#
# When using managed Redis:
#   1. Delete this file from your deployment
#   2. Update redis-service in service.yaml to ExternalName type
#   3. Update REDIS_URL in sealed-secrets with managed Redis connection string
#   4. Update redis-auth Secret in keda-autoscaler.yaml
#
# WHY StatefulSet instead of Deployment?
# - Stable network identity (redis-0) for consistent connections
# - Ordered startup/shutdown guarantees
# - PVC ensures data survives pod restarts (queue messages, conversation state)
# =============================================================================

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: default
  labels:
    app: redis
spec:
  serviceName: redis-service
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999

      containers:
        - name: redis
          image: redis:7-alpine
          args:
            - redis-server
            - --maxmemory
            - "100mb"
            - --maxmemory-policy
            - noeviction            # Fail writes when full (don't silently drop data)
            - --appendonly
            - "yes"                 # Enable AOF persistence (survives pod restarts)
            - --appendfsync
            - everysec              # Fsync every second (good balance of perf vs durability)
            - --save
            - ""                    # Disable RDB snapshots (AOF is sufficient)
            - --loglevel
            - warning
            - --dir
            - /data
          ports:
            - containerPort: 6379
              name: redis
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: "25m"            # Measured: <0.5% CPU
              memory: "128Mi"       # Measured: ~10MB idle, 100mb maxmemory + overhead
            limits:
              cpu: "250m"
              memory: "192Mi"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          livenessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

  # PVC template — data persists across pod restarts
  volumeClaimTemplates:
    - metadata:
        name: redis-data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 1Gi          # 100mb maxmemory + AOF overhead + headroom
        # Azure AKS: default storage class (managed-premium or managed)
        # Uncomment for specific class:
        # storageClassName: managed-premium
