# =============================================================================
# MobilityOne WhatsApp Bot - ConfigMap
#
# NON-SENSITIVE configuration values
# For secrets, use sealed-secrets.yaml
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: mobility-config
  labels:
    app: mobility-bot
data:
  # Application settings
  APP_ENV: "production"
  APP_NAME: "MobilityOne Bot"
  LOG_LEVEL: "WARNING"  # Reduce noise in production

  # -------------------------------------------------------------------------
  # DATABASE CONNECTION POOLING (per pod)
  # -------------------------------------------------------------------------
  # CONNECTION MATH — verify before changing maxReplicaCount in KEDA:
  #
  #   Total connections = (API pods × pool) + (Worker pods × pool) + (Admin × pool)
  #
  #   Current max (2 API + 5 Workers + 1 Admin = 8 pods):
  #     8 × DB_POOL_SIZE(10) = 80 base connections
  #     8 × DB_MAX_OVERFLOW(20) = 160 under burst
  #     Total burst peak: 80 + 160 = 240 connections
  #
  #   PostgreSQL default max_connections = 100 (WILL FAIL at burst!)
  #
  # SOLUTIONS (pick one):
  #   1. Use PgBouncer in front of PostgreSQL (recommended)
  #      - Set PgBouncer pool_size=100, max_client_conn=300
  #      - App connects to PgBouncer, PgBouncer multiplexes to PostgreSQL
  #   2. Increase PostgreSQL max_connections to 300
  #      - Each connection uses ~5-10MB RAM, so 300 = ~2-3GB extra RAM
  #   3. Reduce DB_POOL_SIZE to 5 (halves connection count)
  #      - May cause "connection pool exhausted" under load
  #   4. Reduce KEDA maxReplicaCount to 3 (fewer pods = fewer connections)
  # -------------------------------------------------------------------------
  DB_POOL_SIZE: "10"
  DB_MAX_OVERFLOW: "20"
  DB_POOL_RECYCLE: "3600"

  # Redis settings
  REDIS_MAX_CONNECTIONS: "50"
  REDIS_STREAM_MAXLEN: "10000"

  # AI settings
  AI_MAX_ITERATIONS: "6"
  AI_TEMPERATURE: "0.2"
  AI_MAX_TOKENS: "1500"
  MAX_TOOLS_FOR_LLM: "25"

  # Worker concurrency (per pod — KEDA scales pods horizontally)
  MAX_CONCURRENT: "10"
  BURST_IDLE_TIMEOUT: "300"

  # Rate limiting
  RATE_LIMIT_PER_MINUTE: "20"
  RATE_LIMIT_WINDOW: "60"

  # Cache TTLs
  CACHE_TTL_TOKEN: "3500"
  CACHE_TTL_USER: "300"
  CACHE_TTL_CONTEXT: "86400"
  CACHE_TTL_TOOLS: "3600"

  # Azure OpenAI (non-secret settings only)
  AZURE_OPENAI_API_VERSION: "2024-08-01-preview"
  AZURE_OPENAI_DEPLOYMENT_NAME: "gpt-4o-mini"
  AZURE_OPENAI_EMBEDDING_DEPLOYMENT: "text-embedding-ada-002"

  # Cost tracking
  LLM_INPUT_PRICE_PER_1K: "0.00015"
  LLM_OUTPUT_PRICE_PER_1K: "0.0006"
  DAILY_COST_BUDGET_USD: "50.0"

  # Model drift detection
  DRIFT_BASELINE_DAYS: "7"
  DRIFT_ANALYSIS_HOURS: "6"
  DRIFT_MIN_SAMPLES: "50"

# =============================================================================
# SECRETS: Do NOT store secrets in this file.
# Use Sealed Secrets (k8s/sealed-secrets.yaml) or create manually:
#
# kubectl create secret generic mobility-secrets \
#   --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#   --from-literal=REDIS_URL="redis://..." \
#   ... (see sealed-secrets.yaml for full list of required keys)
# =============================================================================
