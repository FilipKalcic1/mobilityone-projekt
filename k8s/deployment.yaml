# =============================================================================
# MobilityOne WhatsApp Bot - Kubernetes Deployment
# Version: 1.0
#
# COMPONENTS:
# - API (FastAPI webhook receiver)
# - Worker (message processor)
# - Admin API (separate internal service)
#
# RESOURCE LIMITS:
# - Prevents noisy neighbor issues in shared cluster
# - CPU/Memory requests guarantee minimum resources
# - Limits prevent runaway pods from affecting others
# =============================================================================

---
# =============================================================================
# API DEPLOYMENT - Receives WhatsApp webhooks
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobility-api
  labels:
    app: mobility-bot
    component: api
spec:
  replicas: 2  # Minimum for HA
  selector:
    matchLabels:
      app: mobility-bot
      component: api
  template:
    metadata:
      labels:
        app: mobility-bot
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      # NOTE: DB migrations are handled by a separate Job (see below).
      # Do NOT use init containers for migrations - with multiple replicas,
      # concurrent alembic runs cause lock conflicts.

      # Pod-level security: enforce non-root, read-only filesystem
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: api
          image: ghcr.io/mobilityone/bot:latest
          imagePullPolicy: Always  # Required when using :latest tag
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: SERVICE_TYPE
              value: "api"
          envFrom:
            - secretRef:
                name: mobility-secrets
            - configMapRef:
                name: mobility-config

          # Resource limits - Guaranteed QoS (requests == limits)
          # Prevents eviction under node pressure; essential for webhook availability
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

          # Volume mounts for shared cache + writable tmpfs
          volumeMounts:
            - name: cache-volume
              mountPath: /app/.cache
            - name: models-volume
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp

          # Startup probe: 30 failures × 10s = 5 min window for slow starts at 0.5 CPU
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 30
            periodSeconds: 10

          # Liveness: only checked AFTER startup probe succeeds
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3

          # Graceful shutdown
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 10"]

      # Pod anti-affinity - spread across nodes
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: mobility-bot
                    component: api
                topologyKey: kubernetes.io/hostname

      # Volumes for shared cache (speeds up pod startup from 120s to <5s)
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: mobility-cache-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: mobility-cache-pvc  # Same PVC, different mount path
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi

      terminationGracePeriodSeconds: 30

---
# =============================================================================
# WORKER DEPLOYMENT - Processes messages from Redis queue
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobility-worker
  labels:
    app: mobility-bot
    component: worker
spec:
  replicas: 2  # Scaled by KEDA based on queue depth
  selector:
    matchLabels:
      app: mobility-bot
      component: worker
  template:
    metadata:
      labels:
        app: mobility-bot
        component: worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: worker
          image: ghcr.io/mobilityone/bot:latest
          imagePullPolicy: Always
          command: ["python", "worker.py"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          env:
            - name: SERVICE_TYPE
              value: "worker"
          envFrom:
            - secretRef:
                name: mobility-secrets
            - configMapRef:
                name: mobility-config

          # Workers: Guaranteed QoS (requests == limits)
          # 1Gi fits: base ~85MB + FAISS ~15MB + 20 concurrent I/O-bound tasks
          # AI work is I/O-bound (waiting for Azure API), not CPU-bound
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "500m"
              memory: "1Gi"

          # Volume mounts for shared cache + writable tmpfs for DLQ fallback
          volumeMounts:
            - name: cache-volume
              mountPath: /app/.cache
            - name: models-volume
              mountPath: /app/models
            - name: tmp
              mountPath: /tmp

          # Startup probe: 30 failures × 10s = 5 min window for FAISS/ML model loading at 0.5 CPU
          startupProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'python -c "import os,redis; r=redis.from_url(os.environ[\"REDIS_URL\"]); r.ping()"'
            failureThreshold: 30
            periodSeconds: 10

          # Liveness: only checked AFTER startup probe succeeds
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'python -c "import os,redis; r=redis.from_url(os.environ[\"REDIS_URL\"]); r.ping()"'
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3

          readinessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - 'python -c "import os,redis; r=redis.from_url(os.environ[\"REDIS_URL\"]); r.ping()"'
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3

      # Volumes for shared cache
      volumes:
        - name: cache-volume
          persistentVolumeClaim:
            claimName: mobility-cache-pvc
        - name: models-volume
          persistentVolumeClaim:
            claimName: mobility-cache-pvc
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 50Mi  # DLQ fallback file + temporary data

      terminationGracePeriodSeconds: 120  # Must exceed 90s message timeout + 30s safety buffer

---
# =============================================================================
# ADMIN API DEPLOYMENT - Internal admin interface
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mobility-admin
  labels:
    app: mobility-bot
    component: admin
spec:
  replicas: 1  # Single replica for admin
  selector:
    matchLabels:
      app: mobility-bot
      component: admin
  template:
    metadata:
      labels:
        app: mobility-bot
        component: admin
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000

      containers:
        - name: admin
          image: ghcr.io/mobilityone/bot:latest
          imagePullPolicy: Always
          command: ["uvicorn", "admin_api:app", "--host", "0.0.0.0", "--port", "8080"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: SERVICE_TYPE
              value: "admin"
          envFrom:
            - secretRef:
                name: mobility-secrets
            - configMapRef:
                name: mobility-config

          volumeMounts:
            - name: tmp
              mountPath: /tmp

          # Admin: Guaranteed QoS
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "100m"
              memory: "256Mi"

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            failureThreshold: 18
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            periodSeconds: 15

          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            periodSeconds: 5

      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi

---
# =============================================================================
# DB MIGRATION JOB - Run before deploying new versions
# Usage: kubectl apply -f deployment.yaml && kubectl wait --for=condition=complete job/mobility-db-migrate
# =============================================================================
apiVersion: batch/v1
kind: Job
metadata:
  name: mobility-db-migrate
  labels:
    app: mobility-bot
    component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300  # Clean up after 5 minutes
  template:
    metadata:
      labels:
        app: mobility-bot
        component: migration
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
      containers:
        - name: migrate
          image: ghcr.io/mobilityone/bot:latest
          imagePullPolicy: Always
          command: ["python", "-m", "alembic", "upgrade", "head"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: mobility-secrets
            - configMapRef:
                name: mobility-config
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
      volumes:
        - name: tmp
          emptyDir:
            medium: Memory
            sizeLimit: 10Mi

---
# =============================================================================
# POD DISRUPTION BUDGET - Ensure availability during updates
# =============================================================================
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mobility-api-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mobility-bot
      component: api

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mobility-worker-pdb
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mobility-bot
      component: worker
