# =============================================================================
# SEALED SECRETS - GitOps-Safe Secret Management
# =============================================================================
#
# This file is a GUIDE — it does not contain deployable resources.
# You must generate your own SealedSecret using kubeseal.
#
# =============================================================================
# SETUP (one-time per cluster)
# =============================================================================
#
# 1. Install Sealed Secrets controller:
#    helm repo add sealed-secrets https://bitnami-labs.github.io/sealed-secrets
#    helm install sealed-secrets sealed-secrets/sealed-secrets -n kube-system
#
# 2. Install kubeseal CLI:
#    # macOS
#    brew install kubeseal
#    # Linux
#    curl -L https://github.com/bitnami-labs/sealed-secrets/releases/download/v0.27.0/kubeseal-0.27.0-linux-amd64.tar.gz \
#      | tar xz -C /usr/local/bin/ kubeseal
#
# =============================================================================
# REQUIRED SECRETS (all keys that mobility-secrets must contain)
# =============================================================================
#
# Database:
#   DATABASE_URL          - PostgreSQL connection string (bot_user, limited perms)
#   ADMIN_DATABASE_URL    - PostgreSQL connection string (admin_user, full perms)
#
# Redis:
#   REDIS_URL             - Redis connection string
#
# Azure OpenAI:
#   AZURE_OPENAI_API_KEY  - API key for Azure OpenAI
#   AZURE_OPENAI_ENDPOINT - Endpoint URL (e.g., https://m1-ai-dev.openai.azure.com/)
#
# MobilityOne API:
#   MOBILITY_CLIENT_ID     - OAuth2 client ID
#   MOBILITY_CLIENT_SECRET - OAuth2 client secret
#   MOBILITY_TENANT_ID     - Tenant ID (dee707eb-66ad-42e1-92f2-068be031f18a)
#   MOBILITY_API_URL       - API base URL
#   MOBILITY_AUTH_URL      - OAuth2 token endpoint
#
# Infobip (WhatsApp):
#   INFOBIP_API_KEY        - Infobip API key
#   INFOBIP_BASE_URL       - Infobip base URL (e.g., yr1m3g.api.infobip.com)
#   INFOBIP_SENDER_NUMBER  - WhatsApp sender number
#   INFOBIP_SECRET_KEY     - Webhook signature secret
#   WHATSAPP_VERIFY_TOKEN  - Webhook verification token
#
# Admin API:
#   ADMIN_TOKEN_1          - Admin API auth token (64-char hex)
#   ADMIN_TOKEN_1_USER     - Username for token 1
#   ADMIN_TOKEN_2          - Admin API auth token (64-char hex)
#   ADMIN_TOKEN_2_USER     - Username for token 2
#
# Monitoring:
#   SENTRY_DSN             - Sentry error reporting DSN
#
# GDPR:
#   GDPR_HASH_SALT         - 64-char hex salt for PII pseudonymization
#
# Webhook Security:
#   VERIFY_WHATSAPP_SIGNATURE - "true" in production
#
# =============================================================================
# HOW TO CREATE YOUR SEALED SECRET
# =============================================================================
#
# Option 1: Use the helper script (recommended):
#   chmod +x k8s/create-sealed-secret.sh
#   ./k8s/create-sealed-secret.sh
#
# Option 2: Manual creation:
#   # Create plain secret (DO NOT commit this file!)
#   kubectl create secret generic mobility-secrets \
#     --namespace=default \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://bot_user:PASS@db.postgres.database.azure.com:5432/mobility_db?sslmode=require" \
#     --from-literal=ADMIN_DATABASE_URL="postgresql+asyncpg://admin_user:PASS@db.postgres.database.azure.com:5432/mobility_db?sslmode=require" \
#     --from-literal=REDIS_URL="rediss://:KEY@your-redis.redis.cache.windows.net:6380/0" \
#     --from-literal=AZURE_OPENAI_API_KEY="your-key" \
#     --from-literal=AZURE_OPENAI_ENDPOINT="https://m1-ai-dev.openai.azure.com/" \
#     --from-literal=MOBILITY_CLIENT_ID="m1AI" \
#     --from-literal=MOBILITY_CLIENT_SECRET="your-secret" \
#     --from-literal=MOBILITY_TENANT_ID="dee707eb-66ad-42e1-92f2-068be031f18a" \
#     --from-literal=MOBILITY_API_URL="https://dev-k1.mobilityone.io/" \
#     --from-literal=MOBILITY_AUTH_URL="https://dev-k1.mobilityone.io/sso/connect/token" \
#     --from-literal=INFOBIP_API_KEY="your-infobip-key" \
#     --from-literal=INFOBIP_BASE_URL="yr1m3g.api.infobip.com" \
#     --from-literal=INFOBIP_SENDER_NUMBER="12172817448" \
#     --from-literal=INFOBIP_SECRET_KEY="your-webhook-secret" \
#     --from-literal=WHATSAPP_VERIFY_TOKEN="your-verify-token" \
#     --from-literal=VERIFY_WHATSAPP_SIGNATURE="true" \
#     --from-literal=ADMIN_TOKEN_1="your-64-char-hex" \
#     --from-literal=ADMIN_TOKEN_1_USER="filip.kalcic" \
#     --from-literal=ADMIN_TOKEN_2="your-64-char-hex" \
#     --from-literal=ADMIN_TOKEN_2_USER="damir.skrtic" \
#     --from-literal=SENTRY_DSN="https://your-sentry-dsn" \
#     --from-literal=GDPR_HASH_SALT="your-64-char-hex-salt" \
#     --dry-run=client -o yaml > /tmp/plain-secret.yaml
#
#   # Seal it (only your cluster can decrypt)
#   kubeseal --format yaml < /tmp/plain-secret.yaml > k8s/sealed-secrets.yaml
#
#   # Delete plain secret immediately
#   rm /tmp/plain-secret.yaml
#
#   # Apply sealed secret
#   kubectl apply -f k8s/sealed-secrets.yaml
#
# =============================================================================
