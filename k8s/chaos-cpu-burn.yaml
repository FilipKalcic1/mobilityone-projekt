# =============================================================================
# Chaos Mesh: CPU Stress Test for 0.5 CPU Worker
#
# Burns 100% of allocated CPU for 30s to verify:
# - Worker survives without pod restart (no OOM, no probe failure)
# - In-flight messages complete after stress ends
# - KEDA does not trigger unnecessary scale-up
#
# Prerequisites:
#   kubectl apply -f https://mirrors.chaos-mesh.org/v2.7.0/crd.yaml
#   helm install chaos-mesh chaos-mesh/chaos-mesh -n chaos-testing --create-namespace
#
# Usage:
#   kubectl apply -f k8s/chaos-cpu-burn.yaml
#   kubectl get stresschaos cpu-burn-worker -w
#   # After 30s, verify: kubectl get pods -l component=worker
# =============================================================================
apiVersion: chaos-mesh.org/v1alpha1
kind: StressChaos
metadata:
  name: cpu-burn-worker
  namespace: default
spec:
  mode: one
  selector:
    namespaces:
      - default
    labelSelectors:
      app: mobility-bot
      component: worker
  stressors:
    cpu:
      workers: 1
      load: 100
  duration: "30s"
