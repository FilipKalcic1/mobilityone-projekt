# =============================================================================
# etcd Encryption Configuration for Secrets at Rest
# =============================================================================
#
# MANAGED K8S — YOU PROBABLY DON'T NEED THIS FILE:
#   - AKS:  Secrets encrypted at rest by default (platform-managed keys).
#           For customer-managed keys: az aks update --enable-encryption-at-host
#   - EKS:  Enable via aws eks create-cluster --encryption-config
#   - GKE:  Enabled by default with Google-managed keys.
#
# This file is ONLY needed for self-hosted (kubeadm/on-prem) Kubernetes.
#
# SELF-HOSTED SETUP:
# 1. Generate a 32-byte encryption key:
#    head -c 32 /dev/urandom | base64
#
# 2. Replace <BASE64_ENCODED_32_BYTE_KEY> below with the generated key
#
# 3. Place this file on the control plane node at:
#    /etc/kubernetes/encryption-config.yaml
#
# 4. Add to kube-apiserver manifest (/etc/kubernetes/manifests/kube-apiserver.yaml):
#    --encryption-provider-config=/etc/kubernetes/encryption-config.yaml
#
# 5. Restart kube-apiserver (kubeadm does this automatically)
#
# 6. Re-encrypt existing secrets:
#    kubectl get secrets --all-namespaces -o json | kubectl replace -f -
#
# 7. Verify encryption is active:
#    ETCDCTL_API=3 etcdctl get /registry/secrets/default/mobility-secrets | hexdump -C | head
#    (should show k8s:enc:aescbc prefix, NOT plaintext)
# =============================================================================
apiVersion: apiserver.config.k8s.io/v1
kind: EncryptionConfiguration
resources:
  - resources:
      - secrets
    providers:
      - aescbc:
          keys:
            - name: key1
              # REPLACE with output of: head -c 32 /dev/urandom | base64
              # Example (DO NOT USE): secret: "dGhpcyBpcyBhIHRlc3Qga2V5IGZvciBkZW1vIG9ubHk="
              secret: "<BASE64_ENCODED_32_BYTE_KEY>"
      - identity: {}  # Fallback: allows reading unencrypted secrets during migration
